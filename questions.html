<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Sunil</title>
  <style>
    :root {
      --bg: #fff5f8;
      --pink: #ff5d8f;
      --rose: #ff8fab;
      --deep: #8b1e3f;
      --text: #4a1d2f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--bg), #ffe7ef);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .quiz-card {
      width: min(92vw, 620px);
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid rgba(255, 93, 143, 0.2);
      box-shadow: 0 20px 45px rgba(139, 30, 63, 0.16);
      border-radius: 24px;
      padding: 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      color: var(--deep);
      font-size: clamp(1.7rem, 4vw, 2.4rem);
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--text);
      opacity: 0.9;
    }

    .progress {
      margin-bottom: 16px;
      font-weight: 700;
      color: var(--pink);
    }

    .question {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--deep);
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
      text-align: left;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 93, 143, 0.22);
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
    }

    .option input { accent-color: var(--pink); }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), var(--rose));
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(255, 93, 143, 0.25);
    }

    .video-area {
      margin: 14px 0 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .video-area.hidden {
      display: none;
    }

    .video-frame {
      width: min(100%, 360px);
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid rgba(255, 93, 143, 0.24);
      box-shadow: 0 12px 24px rgba(139, 30, 63, 0.14);
      background: #000;
    }

    .video-frame video {
      display: block;
      width: 100%;
      height: auto;
      background: #000;
    }

    .video-caption {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--deep);
    }

    .result {
      margin-top: 16px;
      color: var(--deep);
      font-weight: 600;
      line-height: 1.6;
    }

    .romantic-card {
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(135deg, #fff7fb, #ffe9f0);
      box-shadow: 0 16px 40px rgba(139, 30, 63, 0.14);
      border: 1px solid rgba(255, 93, 143, 0.18);
    }

    .emoji-row {
      font-size: 2rem;
      margin: 10px 0 6px;
      letter-spacing: 0.3rem;
      animation: sway 2.5s ease-in-out infinite;
    }

    @keyframes sway {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .heart-line {
      font-size: 1.05rem;
      margin: 8px 0;
      color: var(--deep);
    }

    .mini-hearts {
      font-size: 1.2rem;
      color: var(--pink);
      margin-top: 8px;
      letter-spacing: 0.2rem;
    }
  </style>
</head>
<body>
  <div class="quiz-card">
    <h1>This questions for you babzz</h1>
    <p class="subtitle">Unmaya Pathil Sollu💖</p>
    <div id="progress" class="progress">Question 1 of 5</div>
    <div id="question" class="question">Do you love me?</div>
    <div id="options" class="options"></div>
    <div id="videoArea" class="video-area hidden"></div>
    <button id="nextBtn">Next</button>
    <div id="result" class="result"></div>
  </div>

 <script>
const questions = [
  { text: "Do you love me?", options: ["Yes", "No"] },
  { text: "What do you love most about me?", options: ["My eyes", "My heart", "My silly side", "Everything"] },
  { text: "Which place would you love to visit with me?", options: ["Beach", "Un veedu", "En veedu", "Bharathi Park"] },
  { text: "What makes our bond special?", options: ["Laughing together", "Being there for each other", "Cute little moments", "All of these"] },
  { text: "What should I do for you today?", options: ["Singing Video", "3 new pics", "Kiss Video", "Dancing Video"] }
];

let currentQuestion = 0;
let answers = [];
let videoModeActive = false;

const progress = document.getElementById("progress");
const question = document.getElementById("question");
const optionsContainer = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const result = document.getElementById("result");
const videoArea = document.getElementById("videoArea");

function renderQuestion() {
  const data = questions[currentQuestion];

  progress.textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
  question.textContent = data.text;

  optionsContainer.innerHTML = "";
  videoArea.innerHTML = "";
  videoArea.classList.add("hidden");
  videoModeActive = false;
  nextBtn.style.display = "inline-block";
  nextBtn.textContent =
    currentQuestion === questions.length - 1 ? "Finish" : "Next";

  result.textContent = "";

  data.options.forEach(option => {
    const label = document.createElement("label");
    label.className = "option";

    label.innerHTML = `
      <input type="radio" name="answer" value="${option}">
      <span>${option}</span>
    `;

    optionsContainer.appendChild(label);
  });
}

function showVideoResponse(choice) {
  const src = choice === "Yes"
    ? "https://www.w3schools.com/html/mov_bbb.mp4"
    : "https://www.w3schools.com/html/movie.mp4";

  videoArea.innerHTML = "";
  videoArea.classList.remove("hidden");

  const wrapper = document.createElement("div");
  wrapper.className = "video-frame";
  wrapper.innerHTML = `
    <video controls autoplay playsinline>
      <source src="${src}" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  `;

  const caption = document.createElement("p");
  caption.className = "video-caption";
  caption.textContent = choice === "Yes"
    ? "Aww, my sweet heart, your yes made me smile 😍"
    : "Even a playful no still feels cute to me 😘";

  videoArea.appendChild(wrapper);
  videoArea.appendChild(caption);
}

nextBtn.addEventListener("click", () => {
  const selected = document.querySelector('input[name="answer"]:checked');

  if (currentQuestion === 0 && videoModeActive) {
    currentQuestion++;

    if (currentQuestion < questions.length) {
      renderQuestion();
    } else {
      progress.textContent = "Finished";
      question.textContent = "My sweet little love 💕";
      optionsContainer.innerHTML = "";
      videoArea.innerHTML = "";
      videoArea.classList.add("hidden");
      nextBtn.style.display = "none";
    }
    return;
  }

  if (!selected) {
    result.textContent = "First option ah choose pannu da venna";
    return;
  }

  answers[currentQuestion] = selected.value;

  if (currentQuestion === 0) {
    videoModeActive = true;
    showVideoResponse(selected.value);
    nextBtn.textContent = "Next QN";
    result.textContent = "Enjoy the little surprise below 💖";
    return;
  }

  currentQuestion++;

  if (currentQuestion < questions.length) {
    renderQuestion();
  } else {
    progress.textContent = "Finished";
    question.textContent = "My sweet little love 💕";
    optionsContainer.innerHTML = "";
    nextBtn.style.display = "none";
  }
});

renderQuestion();
</script>
</body>
</html>
