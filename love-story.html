<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Love Story</title>
  <style>
    :root {
      --bg: #fff5f8;
      --pink: #ff5d8f;
      --rose: #ff8fab;
      --deep: #8b1e3f;
      --text: #4a1d2f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--bg), #ffe7ef);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(92vw, 680px);
      background: rgba(255,255,255,0.94);
      border: 2px solid rgba(255,93,143,0.2);
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(139,30,63,0.16);
      padding: 24px;
      text-align: center;
    }

    .emoji { font-size: 2rem; margin-bottom: 8px; }

    h1 { color: var(--deep); margin: 0 0 10px; }

    .message {
      font-size: 1.05rem;
      line-height: 1.8;
      margin: 10px 0;
      color: var(--deep);
    }

    .heart-line { font-size: 1.1rem; margin: 8px 0; }

    .hearts { font-size: 1.4rem; color: var(--pink); margin-top: 8px; }

    button {
      margin-top: 16px;
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), var(--rose));
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">💘🌙💕</div>
    <h1>Our Little Love Story</h1>
    <p class="message">Every time I think of you, my heart feels softer, warmer, and happier.</p>
    <p class="heart-line">You are my favorite laugh, my sweetest memory, and my calmest place.</p>
    <p class="heart-line">Even the moon seems to shine brighter when I think of you.</p>
    <p class="heart-line">I love you more than words can say, my sweet little love.</p>
    <div class="hearts">💖💖💖💖💖</div>
    <button onclick="window.location.href='questions.html'">Back to Quiz</button>
  </div>
</body>
</html>
