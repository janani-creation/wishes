<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Sunil</title>
  <style>
    :root {
      --bg: #fff5f8;
      --pink: #ff5d8f;
      --rose: #ff8fab;
      --deep: #8b1e3f;
      --text: #4a1d2f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--bg), #ffe7ef);
      color: var(--text);
      min-height: 100vh;
      display: block;
      padding: 20px;
      overflow: auto;
      position: relative;
    }

    .hearts, .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      font-size: 2rem;
      animation: float 4s ease-in-out infinite;
      opacity: 0.8;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
      50% { transform: translateY(-20px) rotate(10deg); opacity: 1; }
    }

    .surprise-container {
      width: 100%;
      max-width: 100%;
      background: rgba(255, 255, 255, 0.88);
      border: 2px solid rgba(255, 93, 143, 0.2);
      box-shadow: 0 20px 50px rgba(139, 30, 63, 0.2);
      border-radius: 24px;
      padding: 20px;
      text-align: center;
      backdrop-filter: blur(8px);
      z-index: 2;
      animation: popIn 0.8s ease forwards;
    }

    @keyframes popIn {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      margin: 0 0 16px;
      color: var(--deep);
    }

    .photo-area {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 520px;
      margin: 20px auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      overflow: visible;
    }

    .photo-frame {
      width: 100%;
      max-width: 520px;
      border: 4px solid var(--pink);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(255, 93, 143, 0.25);
      animation: slideIn 1s ease forwards;
    }

    .photo-area .frame-heart {
      position: absolute;
      font-size: 1.2rem;
      z-index: 2;
      user-select: none;
      pointer-events: none;
    }

    /* .photo-area .frame-heart.red {
      color: rgb(212, 16, 16);
    }

    .photo-area .frame-heart.black {
      color: black;
    } */

    .photo-frame img {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    @keyframes slideIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .message {
      margin-top: 20px;
      color: var(--deep);
      font-size: 1.1rem;
      line-height: 1.6;
    }

    button {
      margin-top: 20px;
      padding: 12px 28px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), var(--rose));
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(255, 93, 143, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(255, 93, 143, 0.3);
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>
  <div class="confetti" id="confetti"></div>

  <div class="surprise-container">
    <h1>Happy Birthday uyirehhh💕</h1>

    <div class="photo-area">
      <div class="photo-frame">
        <img src="WhatsApp Image 2026-07-10 at 3.23.02 PM (1).jpeg" alt="My love" />
      </div>
    </div>

    <div class="message">
      <p>I'm so lucky to have you in my life!</p>
      <p>You make every day special just by being there. 💖</p>
    </div>

    <button onclick="window.location.href='questions.html'">Next</button>
  </div>

  <script>
    function launchConfetti() {
      const confettiContainer = document.getElementById("confetti");
      for (let i = 0; i < 40; i++) {
        const piece = document.createElement("div");
        piece.style.position = "absolute";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.top = "-10px";
        piece.style.width = (Math.random() * 8 + 4) + "px";
        piece.style.height = (Math.random() * 16 + 8) + "px";
        piece.style.background = ["#ff5d8f", "#ff8fab", "#ffd166", "#ff6b6b"][Math.floor(Math.random() * 4)];
        piece.style.opacity = "0.9";
        piece.style.transform = "rotate(" + Math.random() * 360 + "deg)";
        piece.style.animation = `fall ${Math.random() * 1.2 + 1.2}s linear forwards`;
        confettiContainer.appendChild(piece);
        setTimeout(() => piece.remove(), 1800);
      }

      const style = document.createElement("style");
      style.innerHTML = `
        @keyframes fall {
          to {
            transform: translateY(110vh) rotate(720deg);
            opacity: 0;
          }
        }
      `;
      document.head.appendChild(style);
      setTimeout(() => style.remove(), 2000);
    }

    function createFloatingHearts() {
      const hearts = document.getElementById("hearts");
      for (let i = 0; i < 15; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = "💗";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = Math.random() * 100 + "vh";
        heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
        hearts.appendChild(heart);
        setTimeout(() => heart.remove(), 3000);
      }
    }

    function createFrameHearts() {
      const photoArea = document.querySelector(".photo-area");
      const photoFrame = document.querySelector(".photo-frame");
      if (!photoArea || !photoFrame) return;
      const colors = ["red", "black"];
      for (let i = 0; i < 50; i++) {
        const span = document.createElement("span");
        span.className = `frame-heart ${colors[i % 2]}`;
        span.textContent = i % 2 === 0 ? "❤️" : "🖤";
        const side = Math.floor(Math.random() * 4);
        if (side === 0) {
          span.style.top = `${-12 - Math.random() * 12}px`;
          span.style.left = `${Math.random() * 100}%`;
        } else if (side === 1) {
          span.style.bottom = `${-12 - Math.random() * 12}px`;
          span.style.left = `${Math.random() * 100}%`;
        } else if (side === 2) {
          span.style.left = `${-12 - Math.random() * 12}px`;
          span.style.top = `${Math.random() * 100}%`;
        } else {
          span.style.right = `${-12 - Math.random() * 12}px`;
          span.style.top = `${Math.random() * 100}%`;
        }
        photoArea.appendChild(span);
      }
    }

    // window.addEventListener("load", () => {
    //   launchConfetti();
    //   createFloatingHearts();
    //   createFrameHearts();
    // });
  </script>
</body>
</html>
